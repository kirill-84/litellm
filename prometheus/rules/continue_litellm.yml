groups:
  - name: litellm_tokens
    rules:
      - record: litellm_input_tokens_per_sec_5m
        expr: sum(rate(litellm_input_tokens_metric_total[5m]))

      - record: litellm_output_tokens_per_sec_5m
        expr: sum(rate(litellm_output_tokens_metric_total[5m]))

      - record: litellm_total_tokens_per_sec_5m
        expr: sum(rate(litellm_input_tokens_metric_total[5m])) + sum(rate(litellm_output_tokens_metric_total[5m]))

  - name: continue_tokens
    rules:
      # cancel-inclusive: Continue логирует tokensGenerated и для отменённых
      # генераций, поэтому суммарная скорость уже включает отменённые токены.
      - record: continue_generated_tokens_per_sec_5m
        expr: sum(rate(continue_generated_tokens_total[5m]))

      - record: continue_prompt_tokens_per_sec_5m
        expr: sum(rate(continue_prompt_tokens_total[5m]))

  # Намеренно НЕ суммируем continue_* и litellm_*: трафик Continue идёт ЧЕРЕЗ
  # LiteLLM, поэтому это одни и те же токены, посчитанные дважды. Cancel-inclusive
  # итог = continue_generated_tokens_total сам по себе (litellm при отмене недосчитывает).

  - name: continue_autocomplete
    rules:
      # Прокси доли отмен: «показано-но-не-принято». Это НЕ настоящая доля отмен
      # на лету (Esc до показа подсказки обычно не даёт события autocomplete).
      - record: continue_autocomplete_reject_rate_5m
        expr: sum(rate(continue_autocomplete_total{accepted="false"}[5m])) / clamp_min(sum(rate(continue_autocomplete_total[5m])), 1)

      # Доля попаданий в LRU-кэш Continue: такие подсказки отдаются без вызова LLM
      # и завершаются мгновенно — отсюда «Complete» вместо отменяемого запроса.
      - record: continue_autocomplete_cache_hit_rate_5m
        expr: sum(rate(continue_autocomplete_total{cache_hit="true"}[5m])) / clamp_min(sum(rate(continue_autocomplete_total[5m])), 1)
