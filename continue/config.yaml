%YAML 1.1
---
name: Local Config
version: 1.0.0
schema: v1

model_defaults: &model_defaults
  provider: openai
  # openwebui v0.9.6
  apiBase: http://0.0.0.0:3000/api
  apiKey: YOUR_OPEN_WEBUI_API_KEY
models:
  - name: Qwen2.5
    <<: *model_defaults
    model: qwen2.5-coder-3b-instruct-q8_0:latest
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - autocomplete
    autocompleteOptions:
      debounceDelay: 350
      maxPromptTokens: 1024
      onlyMyCode: true
      # Кэш Continue: повтор того же контекста отдаётся без вызова LLM (мгновенно).
      useCache: true
    defaultCompletionOptions:
      # Эти значения Continue шлёт в запросе и они ПЕРЕКРЫВАЮТ дефолты LiteLLM —
      # т.е. именно они и работают. Автодополнение почти детерминированное (0.3 → 0.1).
      temperature: 0.1
      topP: 0.9
      # Cap генерации (синхронно с num_predict в config.yaml); со stop "\n" обычно
      # не достигается, но защищает от «убегания» на однострочной подсказке.
      maxTokens: 512
      stop:
        - "\n"
    requestOptions:
      extraBodyProperties:
        think: false
  # Имя модели должно совпадать с тем, что отдаёт OpenWebUI (= alias LiteLLM
  # 21_GLM-4.5-Air-Q6_K), иначе chat-трафик не пойдёт через LiteLLM и не попадёт в
  # учёт токенов. Раньше тут стояла Meta-Llama-3-8B, которой нет в config.yaml.
  - name: GLM-4.5-Air
    <<: *model_defaults
    model: 21_GLM-4.5-Air-Q6_K
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.2
      # GLM-4.5 рекомендует top_p 0.95.
      topP: 0.95
      maxTokens: 4096
      # Сколько контекста Continue собирает клиентски (≤ num_ctx в config.yaml=16384,
      # иначе Ollama молча обрежет промпт).
      contextLength: 16384
    requestOptions:
      # Крупная модель отвечает дольше: 150с → 540с (синхронно с серверным
      # request_timeout), иначе длинный ответ оборвётся.
      timeout: 540000
      extraBodyProperties:
        # thinking ВЫКЛючен ради отзывчивости IDE (chat/edit/apply); смените на true,
        # если нужны глубокие рассуждения GLM-4.5 ценой задержки.
        think: false

rules:
  - Give concise responses

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase

data:
  - name: Continue Telemetry Exporter
    destination: http://10.0.3.132:4010/ingest
    schema: 0.2.0
    # noCode: метрики токенов и accepted сохраняются, исходный код в журнал не пишется.
    level: noCode
    events:
      - autocomplete
      - chatInteraction
      - editOutcome
      - tokensGenerated
      - toolUsage
