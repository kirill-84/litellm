%YAML 1.1
---
name: Local Config
version: 1.0.0
schema: v1

model_defaults: &model_defaults
  provider: openai
  # openwebui v0.9.6
  apiBase: http://0.0.0.0:3000/api
  apiKey: YOUR_OPEN_WEBUI_API_KEY
models:
  - name: Qwen2.5
    <<: *model_defaults
    model: qwen2.5-coder-3b-instruct-q8_0:latest
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - autocomplete
    autocompleteOptions:
      debounceDelay: 350
      maxPromptTokens: 1024
      onlyMyCode: true
    defaultCompletionOptions:
      temperature: 0.3
      stop:
        - "\n"
    requestOptions:
      extraBodyProperties:
        think: false
  - name: LLama3
    <<: *model_defaults
    model: Meta-Llama-3-8B-Instruct-Q4_K_M.gguf
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.2
      maxTokens: 4096
    requestOptions:
      timeout: 150000

rules:
  - Give concise responses

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase

data:
  - name: Continue Telemetry Exporter
    destination: http://10.0.3.132:4010/ingest
    schema: 0.2.0
    # noCode: метрики токенов и accepted сохраняются, исходный код в журнал не пишется.
    level: noCode
    events:
      - autocomplete
      - chatInteraction
      - editOutcome
      - tokensGenerated
      - toolUsage
